<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Verification | True Acknowledge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { --true-red: #ff0000; --true-blue: #002d72; }
    body { font-family: 'Sarabun', sans-serif; background-color: #ffffff; color: #333; margin: 0; padding: 0; height: 100vh; }
    
    /* 1. หน้าจอ Loading สีขาวเต็มจอ */
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: #ffffff; z-index: 9999;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }

    /* 2. ข้อความ Gradient แดง-น้ำเงิน */
    .gradient-text {
      font-weight: 700; font-size: 1.2rem; text-align: center; padding: 0 20px;
      background: linear-gradient(90deg, var(--true-red) 0%, var(--true-blue) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* 3. การแสดงผลข้อมูลพนักงาน (Full Screen Mode) */
    .user-profile-section {
      background: #ffffff; min-height: 100vh; width: 100%;
      padding: 30px 20px; display: none;
    }
    .profile-card {
      border: none; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 25px;
    }
    .label-tag { font-size: 0.85rem; color: #888; font-weight: 600; margin-bottom: 4px; }
    .value-text { font-size: 1.15rem; color: #000; font-weight: 700; margin-bottom: 15px; }
    
    /* ปุ่มกดพรีเมียม */
    .btn-acknowledge {
      background: linear-gradient(45deg, var(--true-red), #ff4d4d);
      color: white; border: none; border-radius: 15px;
      padding: 18px; width: 100%; font-weight: 700; font-size: 1.1rem;
      box-shadow: 0 10px 20px rgba(255,0,0,0.15); transition: 0.3s;
    }
    .btn-acknowledge:active { transform: scale(0.98); }

    .topic-box {
      background: #f8f9fa; border-radius: 15px; padding: 20px;
      border-left: 5px solid var(--true-red); margin-bottom: 25px;
    }
    
    .spinner-custom { color: var(--true-red); width: 3rem; height: 3rem; margin-bottom: 20px; }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="spinner-border spinner-custom" role="status"></div>
    <div id="loading-msg" class="gradient-text">กำลังตรวจสอบยืนยันตัวตน...</div>
  </div>

  <div id="main-content" class="user-profile-section">
    <div class="container-fluid">
      
      <h4 class="fw-bold mb-4" style="color: var(--true-blue)">ยืนยันข้อมูลพนักงาน</h4>
      
      <div class="profile-card">
        <div class="label-tag">ชื่อ-นามสกุล</div>
        <div id="disp-name" class="value-text">-</div>
        
        <div class="label-tag">รหัสพนักงาน</div>
        <div id="disp-id" class="value-text">-</div>
        
        <div class="label-tag">ช่องทาง / กลุ่ม</div>
        <div id="disp-channel" class="value-text">-</div>
        
        <div class="label-tag">สังกัด / สาขา</div>
        <div id="disp-branch" class="value-text">-</div>
      </div>

      <div id="topic-container" style="display:none;">
        <div class="label-tag mb-2">หัวข้อที่ต้องรับทราบ</div>
        <div class="topic-box">
          <h5 id="topic-name" class="fw-bold m-0 text-dark">-</h5>
        </div>
        <button class="btn-acknowledge" onclick="confirmAcknowledge()">
          <i class="fas fa-check-circle me-2"></i> รับทราบข้อมูล
        </button>
      </div>

      <div id="no-topic" class="text-center py-5" style="display:none;">
        <i class="fas fa-info-circle text-muted mb-3" style="font-size: 3rem;"></i>
        <p class="text-muted">ไม่มีหัวข้อใหม่ที่ต้องรับทราบในขณะนี้</p>
      </div>

    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby-pLn-ACbareuCdomxdkX2Oe1H9gVNseUDb2k-CENm3DX3YrQvbtoFYErSZvHQppU/exec"; 
    let currentUser = null;
    let currentTopic = null;

    async function initLIFF() {
      try {
        await liff.init({ liffId: "YOUR_LIFF_ID" }); // 🚨 ใส่ LIFF ID ของคุณ
        if (!liff.isLoggedIn()) {
          liff.login();
        } else {
          const profile = await liff.getProfile();
          checkUserStatus(profile.userId);
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function checkUserStatus(lineId) {
      try {
        const res = await fetch(`${GAS_URL}?action=getInitialData&lineId=${lineId}`).then(r => r.json());
        
        if (res.isRegistered) {
          currentUser = res.user;
          document.getElementById('disp-name').innerText = currentUser.fullName;
          document.getElementById('disp-id').innerText = currentUser.empId;
          document.getElementById('disp-channel').innerText = currentUser.channel;
          document.getElementById('disp-branch').innerText = currentUser.branch;

          if (res.topics && res.topics.length > 0) {
            currentTopic = res.topics[0];
            document.getElementById('topic-name').innerText = currentTopic.name;
            document.getElementById('topic-container').style.display = 'block';
          } else {
            document.getElementById('no-topic').style.display = 'block';
          }
          
          document.getElementById('loading-screen').style.display = 'none';
          document.getElementById('main-content').style.display = 'block';
        } else {
          // ถ้ายังไม่ลงทะเบียน ให้ไปหน้า register (คุณสามารถปรับลิ้งค์เองได้)
          window.location.href = "register.html";
        }
      } catch (e) {
        Swal.fire("Error", "ไม่สามารถโหลดข้อมูลได้", "error");
      }
    }

    async function confirmAcknowledge() {
      const result = await Swal.fire({
        title: 'ยืนยันการรับทราบ?',
        text: "คุณได้อ่านและทำความเข้าใจเนื้อหาเรียบร้อยแล้ว",
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#ff0000',
        cancelButtonColor: '#aaa',
        confirmButtonText: 'ยืนยัน',
        cancelButtonText: 'ยกเลิก',
        padding: '2em',
        customClass: { popup: 'swal2-rounded' }
      });

      if (result.isConfirmed) {
        showSavingLoader(); // เรียกหน้าจอขาวบันทึกข้อมูล
        
        try {
          const payload = {
            action: 'acknowledge',
            payload: {
              topic: currentTopic.name,
              empId: currentUser.empId,
              fullName: currentUser.fullName,
              channel: currentUser.channel,
              branch: currentUser.branch,
              zone: currentUser.zone,
              category: currentTopic.category,
              device: /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) ? "Mobile" : "PC"
            }
          };

          const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r => r.json());
          
          if (res === "Success") {
            Swal.fire({
              title: 'บันทึกสำเร็จ',
              text: 'ขอบคุณที่รับทราบข้อมูลน้า...',
              icon: 'success',
              timer: 2000,
              showConfirmButton: false
            }).then(() => liff.closeWindow());
          } else {
            document.getElementById('loading-screen').style.display = 'none';
            Swal.fire("แจ้งเตือน", "คุณได้รับทราบหัวข้อนี้ไปแล้วครับ", "info");
          }
        } catch (e) {
          document.getElementById('loading-screen').style.display = 'none';
          Swal.fire("Error", "เกิดข้อผิดพลาดในการเชื่อมต่อ", "error");
        }
      }
    }

    // ฟังก์ชันแสดงหน้าจอสีขาวเต็มจอ ขณะบันทึกข้อมูล
    function showSavingLoader() {
      const loader = document.getElementById('loading-screen');
      const msg = document.getElementById('loading-msg');
      
      msg.innerHTML = "กำลังตรวจสอบ เพื่อบันทึกข้อมูล<br>โปรดรอสักครู่น้า...";
      loader.style.display = 'flex';
    }

    window.onload = initLIFF;
  </script>
</body>
</html>

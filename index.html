<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .main-card { background: white; width: 100%; max-width: 420px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #eee; }
    .btn-true { background: linear-gradient(45deg, #ff0000, #ff4d4d); color: white; border: none; border-radius: 50px; padding: 14px; font-weight: 700; width: 100%; box-shadow: 0 4px 15px rgba(255,0,0,0.2); transition: 0.2s; }
    .consent-box { background-color: #fff3cd; border: 1px solid #ffecb5; border-radius: 22px; padding: 22px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .profile-card { padding: 15px; background: #fff5f5; border-radius: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="main-card">
    <div id="view-loading" class="p-5 text-center">
      <div class="spinner-border text-danger"></div>
      <p class="mt-3 text-muted">กำลังดึงข้อมูลจากระบบ...</p>
    </div>

    <div id="view-register" class="p-4 hidden text-center">
      <img src="https://img1.pic.in.th/images/True--C.png" style="width:90px">
      <h5 class="fw-bold mt-3">Link Account</h5>
      <input type="text" id="reg-id" class="form-control text-center rounded-4 my-3" placeholder="ระบุรหัสพนักงาน" oninput="searchEmp(this.value)">
      <div id="reg-info" class="hidden">
        <div class="p-3 mb-3 rounded-4 text-start" style="background:#fcfcfc; border-left: 5px solid #f00;">
          <div id="reg-name" class="fw-bold"></div>
          <div id="reg-channel" class="text-danger small"></div>
        </div>
        <button class="btn-true" onclick="confirmReg()">Confirm & Start</button>
      </div>
    </div>

    <div id="view-acknowledge" class="p-4 hidden">
      <div class="text-center mb-4"><img src="https://img5.pic.in.th/file/secure-sv1/True--Cffa270ffe548a2c7.png" style="width:70px"></div>
      <div class="profile-card">
        <img id="user-pfp" style="width:55px; height:55px; border-radius:50%;" src="">
        <div>
          <div id="user-name" class="fw-bold"></div>
          <div id="user-meta" class="text-muted small"></div>
        </div>
      </div>
      <select id="topicSelect" class="form-select form-select-lg rounded-4 mb-4"></select>
      <div class="consent-box" onclick="handleSubmit()">
        <input type="checkbox" id="consentCheck" style="width:24px; height:24px; accent-color:#f00;" onclick="event.stopPropagation(); handleSubmit();">
        <label class="m-0 fw-bold small ms-2">รับทราบ และ ปฏิบัติตามอย่างเคร่งครัด</label>
      </div>
    </div>

    <div id="view-success" class="p-5 text-center hidden">
      <i class="fas fa-check-circle text-success" style="font-size: 70px;"></i>
      <h4 class="fw-bold mt-3">บันทึกสำเร็จ</h4>
      <button class="btn btn-dark rounded-pill px-5 mt-4" onclick="liff.closeWindow()">ปิด</button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby-pLn-ACbareuCdomxdkX2Oe1H9gVNseUDb2k-CENm3DX3YrQvbtoFYErSZvHQppU/exec"; // URL จากการ Deploy Google Apps Script
    let lineId, userObj, topicList;

    async function init() {
      await liff.init({ liffId: "1656846002-Wl9ZZgv7" });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const p = await liff.getProfile(); lineId = p.userId;
      
      const res = await fetch(`${GAS_URL}?action=getInitialData&lineId=${lineId}`).then(r => r.json());
      topicList = res.topics;
      if (res.isRegistered) {
        userObj = res.user;
        document.getElementById('user-pfp').src = p.pictureUrl;
        document.getElementById('user-name').innerText = userObj.firstName + " " + userObj.lastName;
        document.getElementById('user-meta').innerText = userObj.empId + " | " + userObj.channel;
        const sel = document.getElementById('topicSelect');
        sel.innerHTML = res.topics.length ? '<option value="" disabled selected>-- เลือกหัวข้อข่าว --</option>' : '<option disabled>-- ไม่มีข่าว --</option>';
        res.topics.forEach(t => sel.add(new Option(t.name, t.name)));
        showView('acknowledge');
      } else { showView('register'); }
    }

    function showView(v) { 
      document.querySelectorAll('.main-card > div').forEach(d => d.classList.add('hidden')); 
      document.getElementById('view-' + v).classList.remove('hidden'); 
    }

    async function searchEmp(id) {
      if (id.length >= 5) {
        const res = await fetch(`${GAS_URL}?action=findEmployee&empId=${id}`).then(r => r.json());
        if (res) {
          document.getElementById('reg-name').innerText = res.firstName + " " + res.lastName;
          document.getElementById('reg-channel').innerText = res.channel;
          document.getElementById('reg-info').classList.remove('hidden');
        } else { document.getElementById('reg-info').classList.add('hidden'); }
      }
    }

    async function confirmReg() {
      const payload = { lineId, empId: document.getElementById('reg-id').value, firstName: document.getElementById('reg-name').innerText.split(' ')[0], lastName: document.getElementById('reg-name').innerText.split(' ')[1], channel: document.getElementById('reg-channel').innerText };
      await callApi('register', payload);
      window.location.reload();
    }

    async function handleSubmit() {
      const t = document.getElementById('topicSelect').value;
      if (!t) return Swal.fire('โปรดเลือกข่าว');
      document.getElementById('consentCheck').checked = true;
      const payload = { topic: t, empId: userObj.empId, fullName: userObj.firstName + " " + userObj.lastName, channel: userObj.channel, category: (topicList.find(x => x.name === t) || {}).category, device: "LINE (" + liff.getOS() + ")" };
      const res = await callApi('acknowledge', payload);
      if (res === "Success") showView('success');
      else { Swal.fire('บันทึกไปแล้ว'); document.getElementById('consentCheck').checked = false; }
    }

    async function callApi(action, payload) {
      Swal.fire({ title: 'กำลังประมวลผล...', didOpen: () => Swal.showLoading() });
      return fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action, payload }) }).then(r => r.json());
    }

    window.onload = init;
  </script>
</body>
</html>

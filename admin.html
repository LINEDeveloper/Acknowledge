<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | True Acknowledge System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f4f6f9; color: #333; }
    .top-header { background: linear-gradient(45deg, #ff0000, #cc0000); color: white; padding: 20px 30px; border-radius: 0 0 20px 20px; box-shadow: 0 4px 15px rgba(255,0,0,0.2); display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
    .card-stat { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
    .card-stat h3 { color: #ff0000; font-weight: bold; font-size: 36px; margin-bottom: 5px; }
    
    /* สไตล์กลุ่มปุ่ม Action */
    .btn-action-group { display: flex; gap: 10px; }
    .btn-custom { border: none; padding: 10px 22px; border-radius: 50px; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.15); font-size: 14px; }
    .btn-email { background: white; color: #ff0000; }
    .btn-email:hover { background: #ffe6e6; transform: translateY(-2px); }
    .btn-download { background: #333; color: white; }
    .btn-download:hover { background: #000; transform: translateY(-2px); }
    
    .table-container { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #eee; }
    .status-active { background-color: #e6f4ea; color: #1e8e3e; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .status-expired { background-color: #f1f3f4; color: #5f6368; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
  </style>
</head>
<body>

  <div class="container-fluid px-4 max-w-1200" style="max-width: 1200px; margin: 0 auto;">
    
    <div class="top-header">
      <div>
        <h2 class="m-0 fw-bold"><i class="fas fa-user-shield me-2"></i> Admin Management</h2>
        <p class="m-0 opacity-75 small">ระบบรายงานผลการรับทราบข้อมูล | Channel Communication</p>
      </div>
      
      <div class="btn-action-group">
        <button class="btn-custom btn-download" onclick="downloadFile()">
          <i class="fas fa-download me-1"></i> ดาวน์โหลดไฟล์
        </button>
        <button class="btn-custom btn-email" onclick="exportReport()">
          <i class="fas fa-paper-plane me-1"></i> ส่งเข้าอีเมล admin
        </button>
      </div>
    </div>

    <div id="loading" class="text-center py-5">
      <div class="spinner-border text-danger" role="status"></div>
      <p class="mt-3 text-muted">กำลังดึงข้อมูลล่าสุด...</p>
    </div>

    <div id="dashboard-content" class="d-none">
      <div class="row g-4 mb-4">
        <div class="col-md-6">
          <div class="card-stat">
            <h5 class="text-muted small fw-bold text-uppercase">พนักงานลงทะเบียนทั้งหมด</h5>
            <h3 id="stat-users">0</h3>
            <span class="text-muted small">ท่าน</span>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card-stat">
            <h5 class="text-muted small fw-bold text-uppercase">ยอดรับทราบข่าวสารรวม</h5>
            <h3 id="stat-ack">0</h3>
            <span class="text-muted small">ครั้ง</span>
          </div>
        </div>
      </div>

      <div class="table-container">
        <h5 class="fw-bold mb-4 text-dark"><i class="fas fa-clipboard-list text-danger me-2"></i> สรุปผลเรียลไทม์แยกตามหัวข้อ</h5>
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead class="table-light">
              <tr>
                <th>หัวข้อข่าวสาร</th>
                <th>หมวดหมู่</th>
                <th class="text-center">สถานะ</th>
                <th>สิ้นสุดเมื่อ</th>
                <th class="text-center">ยอดรับทราบ</th>
              </tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby-pLn-ACbareuCdomxdkX2Oe1H9gVNseUDb2k-CENm3DX3YrQvbtoFYErSZvHQppU/exec";

    async function loadStats() {
      try {
        const res = await fetch(`${GAS_URL}?action=adminStats`).then(r => r.json());
        document.getElementById('loading').classList.add('d-none');
        document.getElementById('dashboard-content').classList.remove('d-none');
        document.getElementById('stat-users').innerText = res.totalUsers.toLocaleString();
        document.getElementById('stat-ack').innerText = res.totalAck.toLocaleString();

        const tbody = document.getElementById('table-body');
        tbody.innerHTML = res.topics.map(t => `
          <tr>
            <td class="fw-bold text-dark">${t.name}</td>
            <td><span class="text-muted small">${t.category}</span></td>
            <td class="text-center">
              <span class="${t.status === 'สิ้นสุดแล้ว' ? 'status-expired' : 'status-active'}">${t.status}</span>
            </td>
            <td class="small text-muted">${t.endDate}</td>
            <td class="text-center fs-5 fw-bold text-danger">${t.count.toLocaleString()}</td>
          </tr>
        `).join('');
      } catch (error) {
        Swal.fire('Error', 'ไม่สามารถเชื่อมต่อข้อมูลได้', 'error');
      }
    }

    // ฟังก์ชันส่งเข้าอีเมล Admin
    async function exportReport() {
      Swal.fire({
        title: 'กำลังส่งอีเมล...',
        text: 'ระบบกำลังแนบไฟล์ Excel และส่งไปยังกล่องข้อความของท่าน',
        didOpen: () => Swal.showLoading(),
        allowOutsideClick: false
      });

      try {
        await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'exportReport' })
        });
        Swal.fire({ icon: 'success', title: 'ส่งสำเร็จ', text: 'ตรวจสอบอีเมลของท่านได้ทันที' });
      } catch (error) {
        Swal.fire('Error', 'ไม่สามารถส่งอีเมลได้ในขณะนี้', 'error');
      }
    }

    // ฟังก์ชันดาวน์โหลดไฟล์โดยตรง (อัปเดตเป็นระบบดึง Base64 เพื่อแก้ปัญหาติดบล็อก)
   async function downloadFile() {
      Swal.fire({
        title: 'กำลังเตรียมไฟล์ดาวน์โหลด...',
        text: 'ระบบกำลังสรุปข้อมูลเฉพาะชีท Data และ Summary Report',
        didOpen: () => Swal.showLoading(),
        allowOutsideClick: false
      });

      try {
        // เปลี่ยน action เป็น downloadCleanExcel
        const res = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'downloadCleanExcel' })
        }).then(r => r.json());

        if (res && res.base64) {
          const dataUrl = "data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64," + res.base64;
          const a = document.createElement('a');
          a.href = dataUrl;
          a.download = res.fileName;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);

          Swal.fire({ icon: 'success', title: 'ดาวน์โหลดสำเร็จ', text: 'ได้ไฟล์สรุปข้อมูลเรียบร้อยแล้ว', timer: 2000, showConfirmButton: false });
        } else {
          throw new Error("Data missing");
        }
      } catch (error) {
        Swal.close();
        Swal.fire('ข้อผิดพลาด', 'ไม่สามารถสรุปไฟล์ได้ในขณะนี้', 'error');
      }
    }

    window.onload = loadStats;
  </script>
</body>
</html>
